services:
  backend:
    build: ./backend
    container_name: effective-backend
    expose:
      - "${BACKEND_PORT}"
    networks:
      - effective-network

  nginx:
    image: nginx:1.27-alpine
    container_name: effective-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - effective-network

networks:
  effective-network:
    driver: bridge