version: "3.9"

services:
  backend: 
    build: ./backend
    container_name: effective-backend
    networks:
      - effective-network
    ports:
      - "8080"
  
  nginx:
    image: nginx:1.27-alpine
    container_name: effective-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - effective-network

networks:
  effective-network:
    driver: bridge